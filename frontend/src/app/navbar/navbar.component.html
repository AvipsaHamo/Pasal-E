<!-- src/app/navbar/navbar.component.html -->

<!-- ── Desktop Sidebar ── -->
<nav class="navbar">
  <!-- Brand -->
  <div class="nav-brand">
    <div class="nav-logo">
      <img src="assets/icons/pasal-e-logo.svg" alt="Pasal-E" onerror="this.style.display='none'" />
    </div>
    <span class="nav-brand-name">Pasal-E</span>
  </div>

  <!-- Links -->
  <ul class="nav-links">
    <li>
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">
        <img src="assets/icons/dashboardicon.svg" alt="Dashboard" class="nav-icon" />
        <span>Dashboard</span>
      </a>
    </li>
    <li>
      <a routerLink="/inventory" routerLinkActive="active" class="nav-item">
        <img src="assets/icons/box.svg" alt="Inventory" class="nav-icon" />
        <span>Inventory</span>
      </a>
    </li>
    <li>
      <a routerLink="/orders" routerLinkActive="active" class="nav-item">
        <img src="assets/icons/ordericon.svg" alt="Orders" class="nav-icon" />
        <span>Orders</span>
      </a>
    </li>
    <li>
      <a routerLink="/your-shop" routerLinkActive="active" class="nav-item">
        <img src="assets/icons/shopicon.svg" alt="Your Shop" class="nav-icon" />
        <span>Your Shop</span>
      </a>
    </li>
  </ul>

  <!-- Logout -->
  <div class="nav-footer">
    <button class="nav-item logout-btn" (click)="auth.logout()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      <span>Log Out</span>
    </button>
  </div>
</nav>

<!-- ── Mobile Bottom Tab Bar ── -->
<nav class="mobile-navbar">
  <a routerLink="/dashboard" routerLinkActive="active" class="mobile-tab">
    <img src="assets/icons/dashboardicon.svg" alt="Dashboard" />
    <span>Dashboard</span>
  </a>
  <a routerLink="/inventory" routerLinkActive="active" class="mobile-tab">
    <img src="assets/icons/box.svg" alt="Inventory" />
    <span>Inventory</span>
  </a>
  <a routerLink="/orders" routerLinkActive="active" class="mobile-tab">
    <img src="assets/icons/ordericon.svg" alt="Orders" />
    <span>Orders</span>
  </a>
  <a routerLink="/your-shop" routerLinkActive="active" class="mobile-tab">
    <img src="assets/icons/shopicon.svg" alt="Your Shop" />
    <span>Your Shop</span>
  </a>
</nav>
