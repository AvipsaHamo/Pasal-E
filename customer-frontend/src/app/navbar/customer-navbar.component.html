<nav class="customer-nav">
  <a class="nav-brand" routerLink="/">
    @if (shopSvc.shopInfo()?.logoImage) {
      <img class="shop-logo" [src]="shopSvc.shopInfo()!.logoImage!" [alt]="shopSvc.shopInfo()!.shopName" />
    } @else {
      <div class="shop-logo-placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </div>
    }
    <span class="shop-name">
      {{ shopSvc.shopInfo()?.brandName ?? shopSvc.shopInfo()?.shopName ?? shopSvc.shopName() }}
    </span>
  </a>

  <ul class="nav-links">
    <li>
      <a class="nav-link" routerLink="/" routerLinkActive="active"
         [routerLinkActiveOptions]="{exact:true}">Home</a>
    </li>
    <li>
      <a class="nav-link" routerLink="/categories" routerLinkActive="active">Category</a>
    </li>
    <li>
      <a class="nav-link" routerLink="/products" routerLinkActive="active">Products</a>
    </li>
    <li>
      <a class="nav-link cart-link" routerLink="/cart" routerLinkActive="active">
        <span class="cart-icon-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
          </svg>
          @if (cartSvc.count() > 0) {
            <span class="cart-badge">{{ cartSvc.count() }}</span>
          }
        </span>
        Cart
      </a>
    </li>
  </ul>
</nav>
